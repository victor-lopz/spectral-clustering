repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace # Trims trailing whitespace from all files
      - id: end-of-file-fixer # Ensures files end with a newline
      - id: check-yaml # Validates YAML syntax structure
      - id: check-added-large-files # Prevents accidentally committing massive files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check # lint python files
      - id: ruff-format # format python files

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [markdown, yaml] # format markdown and yaml files
